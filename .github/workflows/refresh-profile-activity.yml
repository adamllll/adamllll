name: Refresh profile activity

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-activity-refresh
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v5

      - name: Render contribution identity
        env:
          PROFILE_LOGIN: adamllll
          GH_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN || github.token }}
        run: python3 scripts/render_profile_activity.py

      - name: Commit only when the visual changed
        run: |
          if git diff --quiet -- assets/profile-activity.svg; then
            echo "Profile activity is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/profile-activity.svg
          git commit -m "chore(profile): refresh activity identity"
          git push
