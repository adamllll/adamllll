name: Refresh profile hero

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-hero-refresh
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Render commit-driven hero
        env:
          PROFILE_LOGIN: adamllll
          GH_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN || github.token }}
        run: python3 scripts/render_profile_hero.py

      - name: Commit only when the visual changed
        run: |
          if git diff --quiet -- assets/adam-os-hero.svg; then
            echo "Profile pulse is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/adam-os-hero.svg
          git commit -m "chore(profile): refresh commit pulse"
          git push
