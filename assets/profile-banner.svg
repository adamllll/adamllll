    <path d="M0 360H1280" stroke="#19F5FF" stroke-opacity="0.12"/>
    <path d="M0 396H1280" stroke="#19F5FF" stroke-opacity="0.08"/>
  </g>

  <g fill="#F8E8FF" opacity="0.9">
