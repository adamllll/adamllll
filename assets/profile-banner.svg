<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A001F"/>
      <stop offset="0.52" stop-color="#14072B"/>
      <stop offset="1" stop-color="#041A2F"/>
    </linearGradient>
    <linearGradient id="sun" x1="640" y1="46" x2="640" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFB4F6"/>
      <stop offset="1" stop-color="#FF6EC7"/>
    </linearGradient>
    <linearGradient id="grid" x1="0" y1="280" x2="1280" y2="280" gradientUnits="userSpaceOnUse">
