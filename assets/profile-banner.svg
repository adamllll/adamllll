    <text x="84" y="198" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="92" font-weight="700" letter-spacing="4">ADAM</text>
    <text x="88" y="246" fill="#FF6EC7" font-family="'Courier New', monospace" font-size="30" letter-spacing="4">JAVA BACKEND // SYSTEMS // NARRATIVE UI</text>
