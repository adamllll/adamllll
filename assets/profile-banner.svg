      <stop offset="1" stop-color="#19F5FF" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glowPink" x="0" y="0" width="1280" height="420" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="420" fill="url(#bg)"/>
  <circle cx="640" cy="126" r="88" fill="url(#sun)" opacity="0.9"/>

