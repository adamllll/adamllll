<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A001F"/>
      <stop offset="0.52" stop-color="#14072B"/>
      <stop offset="1" stop-color="#041A2F"/>
    </linearGradient>
    <linearGradient id="sun" x1="640" y1="118" x2="640" y2="310" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFB4F6"/>
      <stop offset="1" stop-color="#FF6EC7"/>
    </linearGradient>
    <linearGradient id="grid" x1="0" y1="430" x2="1280" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#19F5FF" stop-opacity="0.1"/>
      <stop offset="0.5" stop-color="#19F5FF" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#19F5FF" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glowPink" x="0" y="0" width="1280" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="640" cy="196" r="104" fill="url(#sun)" opacity="0.9"/>
  <g opacity="0.35">
    <path d="M0 430H1280" stroke="url(#grid)" stroke-width="2"/>
    <path d="M70 430L640 640" stroke="#19F5FF" stroke-opacity="0.32"/>
    <path d="M1210 430L640 640" stroke="#19F5FF" stroke-opacity="0.32"/>
    <path d="M180 430L640 640" stroke="#19F5FF" stroke-opacity="0.22"/>
    <path d="M1100 430L640 640" stroke="#19F5FF" stroke-opacity="0.22"/>
    <path d="M0 470H1280" stroke="#19F5FF" stroke-opacity="0.18"/>
    <path d="M0 520H1280" stroke="#19F5FF" stroke-opacity="0.14"/>
    <path d="M0 580H1280" stroke="#19F5FF" stroke-opacity="0.1"/>
  </g>

  <g fill="#F8E8FF" opacity="0.9">
    <circle cx="128" cy="104" r="2"/>
    <circle cx="242" cy="88" r="2"/>
    <circle cx="998" cy="90" r="2"/>
    <circle cx="1112" cy="130" r="3"/>
    <circle cx="1048" cy="170" r="2"/>
    <circle cx="168" cy="162" r="3"/>
  </g>

  <g filter="url(#glowPink)">
    <text x="98" y="132" fill="#19F5FF" font-family="'Courier New', monospace" font-size="26" letter-spacing="8">GITHUB PROFILE // ENTRY POSTER</text>
    <text x="94" y="272" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="110" font-weight="700" letter-spacing="6">ADAM</text>
    <text x="98" y="336" fill="#FF6EC7" font-family="'Courier New', monospace" font-size="40" letter-spacing="6">JAVA BACKEND // SYSTEMS // NARRATIVE UI</text>
    <text x="98" y="392" fill="#C9D9FF" font-family="'Courier New', monospace" font-size="28" letter-spacing="3">A vaporwave gateway from GitHub into an immersive personal desktop.</text>
  </g>

  <rect x="92" y="448" width="520" height="80" rx="8" fill="#07111D" fill-opacity="0.8" stroke="#19F5FF" stroke-opacity="0.5"/>
  <text x="120" y="482" fill="#19F5FF" font-family="'Courier New', monospace" font-size="22" letter-spacing="2">PRIMARY PATH</text>
  <text x="120" y="520" fill="#FFFFFF" font-family="'Courier New', monospace" font-size="30">GitHub → Bridge → Immersive Site</text>

  <rect x="786" y="80" width="388" height="210" rx="14" fill="#090311" fill-opacity="0.78" stroke="#FF6EC7" stroke-opacity="0.35"/>
  <text x="818" y="124" fill="#FF6EC7" font-family="'Courier New', monospace" font-size="22" letter-spacing="3">SIGNALS</text>
  <text x="818" y="168" fill="#FFFFFF" font-family="'Courier New', monospace" font-size="24">• Projects as artifacts</text>
  <text x="818" y="206" fill="#FFFFFF" font-family="'Courier New', monospace" font-size="24">• Technical writing with context</text>
  <text x="818" y="244" fill="#FFFFFF" font-family="'Courier New', monospace" font-size="24">• Strong point of view</text>
