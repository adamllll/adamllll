<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">ADAM contribution identity</title>
  <desc id="desc">A living GitHub profile generated from real activity. The rolling year contains 240 contributions across 75 active days, with 5 contributions in the last seven days.</desc>
  <metadata>source=github-contribution-calendar; user=adamllll; window=52-sunday-weeks</metadata>
  <defs>
    <style>
      .activity-band, .timeline-band {
        transform-box: fill-box;
        transform-origin: center bottom;
        animation: band-rise .85s cubic-bezier(.16,1,.3,1) both;
      }
      .activity-scan { animation: scan 7.40s cubic-bezier(.16,1,.3,1) infinite; }
      .recent-band { animation: recent-pulse 2.8s ease-in-out infinite; }
      @keyframes band-rise {
        from { transform: scaleY(.03); opacity: 0; }
        to { transform: scaleY(1); }
      }
      @keyframes scan {
        0% { transform: translateX(-180px); opacity: 0; }
        12% { opacity: .72; }
        72% { opacity: .72; }
        88%, 100% { transform: translateX(1660px); opacity: 0; }
      }
      @keyframes recent-pulse {
        0%, 100% { opacity: 0; }
        50% { opacity: .18; }
      }
      @media (prefers-reduced-motion: reduce) {
        .activity-band, .timeline-band, .activity-scan, .recent-band { animation: none; }
      }
    </style>
    <clipPath id="adam-word">
      <text x="52" y="366" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="380" font-weight="900" letter-spacing="-22">ADAM</text>
    </clipPath>
  </defs>

