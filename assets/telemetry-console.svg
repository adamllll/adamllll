<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">ADAM OS telemetry console</title>
  <desc id="desc">A Windows 95 and vaporwave inspired static console panel for the GitHub profile.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1a0a2e"/>
      <stop offset="0.48" stop-color="#2d1b4e"/>
      <stop offset="1" stop-color="#000080"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.48" stop-color="#d9d9d9"/>
      <stop offset="0.5" stop-color="#9f9f9f"/>
      <stop offset="1" stop-color="#f5f5f5"/>
    </linearGradient>
    <linearGradient id="titlebar" x1="0" x2="1">
      <stop offset="0" stop-color="#000080"/>
      <stop offset="0.62" stop-color="#7b2cbf"/>
      <stop offset="1" stop-color="#00d8ff"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" x2="1">
      <stop offset="0" stop-color="#00d8ff"/>
      <stop offset="0.52" stop-color="#ff6ad5"/>
      <stop offset="1" stop-color="#72f1b8"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 H 0 V 48" fill="none" stroke="#c774e8" stroke-opacity="0.22" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="#070b12"/>
  <rect x="32" y="32" width="1136" height="296" fill="#c0c0c0"/>
  <path d="M32 32H1168V328H32Z" fill="none" stroke="#ffffff" stroke-width="4"/>
  <path d="M38 326H1168V32" fill="none" stroke="#222222" stroke-width="4"/>

  <rect x="48" y="48" width="1104" height="40" fill="url(#titlebar)"/>
  <text x="68" y="74" fill="#ffffff" font-family="Consolas, 'Courier New', monospace" font-size="22" font-weight="700">ADAM_OS.EXE / PUBLIC SIGNAL MONITOR</text>
  <g transform="translate(1054 56)">
    <rect width="26" height="24" fill="#c0c0c0" stroke="#ffffff"/>
    <path d="M2 22H26V0" fill="none" stroke="#222222" stroke-width="2"/>
    <path d="M7 12H19" stroke="#111111" stroke-width="3"/>
    <rect x="36" width="26" height="24" fill="#c0c0c0" stroke="#ffffff"/>
    <path d="M38 22H62V0" fill="none" stroke="#222222" stroke-width="2"/>
    <rect x="43" y="6" width="12" height="10" fill="none" stroke="#111111" stroke-width="2"/>
    <rect x="72" width="26" height="24" fill="#c0c0c0" stroke="#ffffff"/>
    <path d="M74 22H98V0" fill="none" stroke="#222222" stroke-width="2"/>
    <path d="M79 6L93 18M93 6L79 18" stroke="#111111" stroke-width="2.5"/>
  </g>

  <rect x="60" y="104" width="1080" height="204" fill="url(#sky)" stroke="#222222" stroke-width="3"/>
  <rect x="60" y="104" width="1080" height="204" fill="url(#grid)" opacity="0.95"/>

  <g opacity="0.75">
    <path d="M64 283 C150 252 234 254 312 280 S458 312 544 288 S712 238 842 274 S1040 314 1136 266" fill="none" stroke="#00d8ff" stroke-width="2"/>
    <path d="M64 308 C210 254 312 306 448 288 S670 214 798 262 S1008 328 1136 236" fill="none" stroke="#ff6ad5" stroke-width="2"/>
  </g>

  <path d="M80 292L176 264L272 282L368 238L464 268L560 214L656 258L752 190L848 238L944 176L1040 228L1120 142" fill="none" stroke="url(#wave)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <g fill="#ff6ad5" stroke="#f8f7ff" stroke-width="2">
    <circle cx="176" cy="264" r="7"/>
    <circle cx="368" cy="238" r="7"/>
    <circle cx="560" cy="214" r="7"/>
    <circle cx="752" cy="190" r="7"/>
    <circle cx="944" cy="176" r="7"/>
    <circle cx="1120" cy="142" r="7"/>
  </g>

  <g font-family="Consolas, 'Courier New', monospace">
    <text x="92" y="146" fill="#72f1b8" font-size="20" font-weight="700">C:\ADAM_OS\SIGNALS&gt; inspect graph-source</text>
    <text x="92" y="184" fill="#f8f7ff" font-size="16">window: last 31 days public events only</text>
    <text x="92" y="212" fill="#f8f7ff" font-size="16">private: use GitHub native contribution calendar</text>
    <text x="92" y="240" fill="#f8f7ff" font-size="16">mode: rhythm over scoreboard</text>

    <rect x="790" y="128" width="284" height="112" fill="#050816" fill-opacity="0.78" stroke="#00d8ff" stroke-width="2"/>
    <text x="812" y="162" fill="#00d8ff" font-size="16" font-weight="700">SIGNAL BUS</text>
    <text x="812" y="194" fill="#ff6ad5" font-size="15">TRACE: PUBLIC_ONLY</text>
    <text x="812" y="220" fill="#72f1b8" font-size="15">STATUS: LABELLED</text>
  </g>

  <rect x="48" y="318" width="1104" height="10" fill="#808080"/>
  <rect x="48" y="318" width="196" height="10" fill="#00d8ff"/>
  <rect x="244" y="318" width="196" height="10" fill="#ff6ad5"/>
  <rect x="440" y="318" width="196" height="10" fill="#c774e8"/>
</svg>
